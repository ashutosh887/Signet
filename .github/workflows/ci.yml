name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache liboqs
        id: liboqs-cache
        uses: actions/cache@v4
        with:
          path: ~/_oqs
          key: liboqs-0.15.0-slhdsa-${{ runner.os }}

      - name: Build liboqs
        if: steps.liboqs-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          git clone --branch 0.15.0 --depth 1 https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cmake -G Ninja -S /tmp/liboqs -B /tmp/liboqs/build \
            -DBUILD_SHARED_LIBS=ON -DOQS_BUILD_ONLY_LIB=ON \
            -DOQS_MINIMAL_BUILD="SIG_ml_dsa_44;SIG_sphincs_sha2_128s_simple;KEM_ml_kem_768" \
            -DCMAKE_INSTALL_PREFIX=$HOME/_oqs -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/liboqs/build --parallel
          cmake --install /tmp/liboqs/build

      - name: Export liboqs paths
        run: |
          echo "LD_LIBRARY_PATH=$HOME/_oqs/lib" >> "$GITHUB_ENV"
          echo "DYLD_LIBRARY_PATH=$HOME/_oqs/lib" >> "$GITHUB_ENV"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ./sdk-python -e ./verifier pytest httpx

      - name: SDK smoke test
        run: |
          python - <<'PY'
          import signet
          identity = signet.Identity.generate(principal_id="prn_ci")
          env = signet.Envelope(
              agent_id=identity.agent_id,
              principal_id=identity.principal_id,
              action={"type": "tool_call", "name": "ci", "params": {}},
          )
          env.sign(identity)
          assert env.signature["algorithm"] == "ML-DSA-44"
          assert "hybrid_classical_value" in env.signature
          print("SDK smoke OK")
          PY

      - name: Round-trip against running verifier
        env:
          SIGNET_SKIP_TRAIN: "1"
          SIGNET_DB_PATH: /tmp/signet_ci.db
        run: |
          rm -f /tmp/signet_ci.db
          python -m uvicorn signet_verifier.main:app --port 8000 --log-level warning >/tmp/verifier.log 2>&1 &
          VPID=$!
          trap 'kill $VPID 2>/dev/null || true; echo "--- verifier log ---"; cat /tmp/verifier.log || true' EXIT
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/health >/dev/null; then
              echo "verifier up after ${i} attempts"
              break
            fi
            if ! kill -0 $VPID 2>/dev/null; then
              echo "verifier process died"
              exit 1
            fi
            sleep 0.5
          done
          curl -sf http://localhost:8000/health >/dev/null || { echo "verifier never became ready"; exit 1; }
          python - <<'PY'
          import signet
          i = signet.Identity.generate(principal_id="prn_ci")
          signet.register(i)
          e = signet.Envelope(agent_id=i.agent_id, principal_id=i.principal_id,
                              action={"type":"tool_call","name":"ci","params":{}})
          e.sign(i)
          v = signet.submit(e)
          assert v["valid"] is True, v
          print("Round-trip OK")
          PY
